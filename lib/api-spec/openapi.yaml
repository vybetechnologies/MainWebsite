openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: booking
    description: Booking / contact request operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /booking-requests:
    post:
      operationId: createBookingRequest
      tags: [booking]
      summary: Submit a booking / contact request
      description: Sends a booking request email to the business via Resend
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingRequestInput"
      responses:
        "201":
          description: Booking request sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookingRequestResult"
        "400":
          description: Invalid request body
        "502":
          description: Failed to send booking request email
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    BookingRequestInput:
      type: object
      required:
        - firstName
        - lastName
        - email
        - service
        - message
      properties:
        firstName:
          type: string
          minLength: 1
        lastName:
          type: string
          minLength: 1
        email:
          type: string
          minLength: 3
          pattern: "^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$"
        phone:
          type: string
        service:
          type: string
          minLength: 1
        message:
          type: string
          minLength: 1
    BookingRequestResult:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean

