kind = "web"
previewPath = "/"
title = "VYBE Technologies Website"
version = "1.0.0"
id = "artifacts/vybe-website"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25949

[services.development]
run = "pnpm --filter @workspace/vybe-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vybe-website", "run", "build" ]
serve = "static"
publicDir = "artifacts/vybe-website/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25949"
BASE_PATH = "/"
